title: Potential Port Scanning Detected via Sysmon EventID 3
id: f4e5d6c7-1234-4abc-bcde-1234567890ef
status: experimental
description: Phát hiện một địa chỉ IP nguồn kết nối tới quá nhiều cổng khác nhau trên máy hiện tại trong thời gian ngắn, dựa trên dữ liệu kết nối mạng của Sysmon.
author: Tang The Anh
date: 2026/04/05
tags:
    - attack.discovery
    - attack.t1046
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 3
        Initiated: 'false'
    timeframe: 1m
    condition: selection | count(DestinationPort) by SourceIp > 1
fields:
    - SourceIp
    - DestinationPort
    - Image
falsepositives:
    - Các máy chủ Web hoặc API nhận nhiều kết nối từ các Client hợp lệ.
    - Các dịch vụ quét lỗ hổng nội bộ (như Nessus, OpenVAS).
level: high