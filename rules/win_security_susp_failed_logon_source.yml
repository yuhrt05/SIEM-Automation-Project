title: Failed Logon From Public IP
id: f88e112a-21aa-44bd-9b01-6ee2a2bbbed1
status: test
description: Detects a failed logon attempt from a public IP. Fixed for Elasticsearch IP data type compatibility.
references:
    - https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-10/security/threat-protection/auditing/event-4625
author: NVISO (Fixed by SOC Assistant)
date: 2020-05-06
modified: 2024-03-30
tags:
    - attack.initial-access
    - attack.t1078
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
    filter_local_loopback:
        # Loại bỏ IP local loopback (máy tự đăng nhập chính nó)
        IpAddress|cidr:
            - '::1/128'
            - '127.0.0.0/8'
    # Lưu ý: Nếu muốn bắt cả IP trong mạng LAN (192.168.x.x) để Demo 
    # thì ĐỪNG thêm dải LAN vào phần filter dưới đây.
    condition: selection and not filter_local_loopback
falsepositives:
    - Legitimate logon attempts over the internet
level: medium